name: CI

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Quality and production build
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: 22
          cache: npm

      - name: Restore Next.js build cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ${{ github.workspace }}/.next/cache
          key: ${{ runner.os }}-next-${{ hashFiles('package-lock.json') }}-${{ hashFiles('src/**', 'desktop/**', 'next.config.ts', 'package.json') }}
          restore-keys: |
            ${{ runner.os }}-next-${{ hashFiles('package-lock.json') }}-

      - name: Install dependencies
        run: npm ci

      - name: Run required checks
        run: npm run check

      - name: Build production application
        run: npm run build

  docker:
    name: Docker build and smoke test
    needs: quality
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4

      - name: Build Docker image without publishing
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          load: true
          push: false
          tags: po-agent:ci
          build-args: |
            NPM_REGISTRY=https://registry.npmjs.org
          cache-from: type=gha,scope=ci-docker
          cache-to: type=gha,mode=max,scope=ci-docker

      - name: Start container
        run: docker run --detach --name po-agent-ci --publish 51732:51732 po-agent:ci

      - name: Wait for application response
        shell: bash
        run: |
          for attempt in {1..30}; do
            if curl --fail --silent --show-error http://127.0.0.1:51732/ > /dev/null; then
              exit 0
            fi
            sleep 2
          done
          echo "Application did not become ready within 60 seconds."
          exit 1

      - name: Collect logs and remove container
        if: always()
        shell: bash
        run: |
          docker logs po-agent-ci || true
          docker rm --force po-agent-ci || true

  windows-package:
    name: Windows package smoke build
    needs: quality
    runs-on: windows-latest
    timeout-minutes: 45
    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: 22
          cache: npm

      - name: Restore desktop build caches
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            ${{ github.workspace }}\.next\cache
            ~\AppData\Local\electron\Cache
            ~\AppData\Local\electron-builder\Cache
          key: windows-desktop-${{ hashFiles('package-lock.json') }}-${{ hashFiles('src/**', 'desktop/**', 'resources/**', 'next.config.ts', 'package.json') }}
          restore-keys: |
            windows-desktop-${{ hashFiles('package-lock.json') }}-

      - name: Install dependencies
        run: npm ci

      - name: Build unpacked Windows application
        run: npm run desktop:pack

      - name: Verify Windows executable
        shell: pwsh
        run: |
          $executable = ".desktop-dist\win-unpacked\Po Agent.exe"
          if (-not (Test-Path -LiteralPath $executable)) {
            throw "Windows executable was not generated: $executable"
          }
